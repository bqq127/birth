<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>生日主题 · 8星轨环绕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #fff0f6 0%, #ffe3f0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .stage {
      position: relative;
      width: 700px;
      height: 700px;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
      transform-style: preserve-3d;
      z-index: 10;
    }

    .stage .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #ff8fb8;
      opacity: 0.25;
    }
    .stage .orbit-ring:nth-child(1) { width: 280px; height: 280px; }
    .stage .orbit-ring:nth-child(2) { width: 340px; height: 340px; }
    .stage .orbit-ring:nth-child(3) { width: 400px; height: 400px; }
    .stage .orbit-ring:nth-child(4) { width: 460px; height: 460px; }
    .stage .orbit-ring:nth-child(5) { width: 520px; height: 520px; }
    .stage .orbit-ring:nth-child(6) { width: 580px; height: 580px; }
    .stage .orbit-ring:nth-child(7) { width: 640px; height: 640px; }
    .stage .orbit-ring:nth-child(8) { width: 700px; height: 700px; opacity: 0.15; }

    .center-role {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #ff78a5;
      box-shadow: 0 0 35px #ff78a5, 0 0 70px #ffacc5;
      cursor: pointer;
      position: relative;
      transform: translateZ(80px);
      transform-style: preserve-3d;
      z-index: 999;
    }

    .center-role::after {
      content: "🎂 HAPPY BIRTHDAY";
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff78a5;
      color: #fff;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .center-role img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .orbit-role {
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #ffdae6;
      background: #fff;
      cursor: pointer;
      transform-style: preserve-3d;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      transition: all 0.2s;
      z-index: 888;
    }
    .orbit-role:hover {
      transform: translateZ(20px) scale(1.08);
      border-color: #ff78a5;
    }
    .orbit-role img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .star-decor {
      position: absolute;
      font-size: 20px;
      animation: float 5s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }

    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(255, 245, 250, 0.97);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .popup.show {
      display: flex;
    }
    .popup video {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 18px;
      border: 3px solid #ff78a5;
      box-shadow: 0 0 50px rgba(255, 120, 165, 0.4);
    }
    .close {
      position: absolute;
      top: 30px; right: 30px;
      font-size: 42px;
      color: #ff78a5;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <audio id="bgm" loop>
    <source src="1.mp3" type="audio/mpeg">
  </audio>

  <div class="stage">
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>

    <div class="center-role" data-video="生日.mp4">
      <img src="生日.jpg" alt="生日">
    </div>

    <div class="orbit-role" data-video="异域.mp4"><img src="异域.jpg"></div>
    <div class="orbit-role" data-video="侠客.mp4"><img src="侠客.jpg"></div>
    <div class="orbit-role" data-video="高雅.mp4"><img src="高雅.jpg"></div>
    <div class="orbit-role" data-video="忧郁.mp4"><img src="忧郁.jpg"></div>
  </div>

  <div class="popup">
    <span class="close">×</span>
    <video id="player" loop playsinline></video>
  </div>

  <script>
    // ========== 背景音乐：最强兼容自动播放 ==========
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.67;

    // 页面加载尝试播放
    window.addEventListener('load', () => {
      setTimeout(() => {
        bgm.play().catch(() => {});
      }, 500);
    });

    // 只要用户点击页面任意位置 → 播放音乐（手机必生效）
    document.addEventListener('click', () => {
      bgm.play();
    }, { once: true });

    // ========== 星环装饰 ==========
    const stage = document.querySelector('.stage');
    const icons = ["🎂", "🎈", "✨", "🎁", "🎊", "💖"];
    const orbits = [280, 340, 400, 460, 520, 580, 640, 700];

    for (let i = 0; i < 40; i++) {
      let dec = document.createElement('div');
      dec.className = 'star-decor';
      dec.innerText = icons[Math.floor(Math.random() * icons.length)];
      const r = orbits[Math.floor(Math.random() * orbits.length)] / 2;
      const angle = Math.random() * Math.PI * 2;
      const x = 350 + r * Math.cos(angle) - 10;
      const y = 350 + r * Math.sin(angle) - 10;
      dec.style.left = x + 'px';
      dec.style.top = y + 'px';
      dec.style.animationDelay = Math.random() * 3 + 's';
      stage.appendChild(dec);
    }

    // ========== 慢速匀速旋转 ==========
    const cards = document.querySelectorAll('.orbit-role');
    const centerX = 350, centerY = 350;
    const orbitRadius = 290;
    const cardSize = 65;
    let angle = 0;

    function animateOrbit() {
      angle += 0.008;
      cards.forEach((el, i) => {
        const offset = (Math.PI * 2 * i) / 4;
        const x = centerX + orbitRadius * Math.cos(angle + offset) - cardSize;
        const y = centerY + orbitRadius * Math.sin(angle + offset) - cardSize;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
      });
      requestAnimationFrame(animateOrbit);
    }
    animateOrbit();

    // ========== 点击播放视频 → 停止背景音乐 ==========
    const roles = document.querySelectorAll('.center-role, .orbit-role');
    const popup = document.querySelector('.popup');
    const player = document.getElementById('player');
    const close = document.querySelector('.close');

    roles.forEach(role => {
      role.addEventListener('click', () => {
        bgm.pause();
        player.src = role.dataset.video;
        player.play();
        popup.classList.add('show');
      });
    });

    close.addEventListener('click', () => {
      player.pause();
      player.src = '';
      popup.classList.remove('show');
      bgm.play();
    });
  </script>
</body>
</html>
