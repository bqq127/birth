<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>生日星轨 · 永恒环绕 | 手机电脑完美一致</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* 避免移动端长按菜单干扰，不影响交互 */
    }

    body {
      background: radial-gradient(circle at 30% 20%, #fff0f6, #ffe0ed);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* 
      核心思路：舞台固定 700x700 像素，利用 CSS 缩放 + transform-origin 完美适配所有屏幕
      保证圆环、轨道半径、中心位置、环绕视觉在手机与电脑完全一致（比例相同）
    */
    .stage-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .stage {
      position: relative;
      width: 700px;
      height: 700px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
      transform-style: preserve-3d;
      z-index: 10;
      /* 缩放基于中心，保证所有圆环和卡片相对位置不变 */
      transform-origin: center center;
      will-change: transform;
    }

    /* 8个装饰圆环 - 同心圆，半径依次递增 (直径从180px 到 700px 优雅分布) */
    .stage .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #ff8fb8;
      opacity: 0.28;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 2px rgba(255,120,165,0.2);
      transition: opacity 0.2s;
    }
    /* 精确圆环层级: 保证视觉丰富且贴合“8星轨”主题 */
    .stage .orbit-ring:nth-child(1) { width: 180px; height: 180px; border-width: 1px; opacity: 0.2; }
    .stage .orbit-ring:nth-child(2) { width: 250px; height: 250px; border-width: 1px; opacity: 0.22; }
    .stage .orbit-ring:nth-child(3) { width: 320px; height: 320px; border-width: 1px; opacity: 0.24; }
    .stage .orbit-ring:nth-child(4) { width: 390px; height: 390px; border-width: 1px; opacity: 0.26; }
    .stage .orbit-ring:nth-child(5) { width: 460px; height: 460px; border-width: 1px; opacity: 0.28; }
    .stage .orbit-ring:nth-child(6) { width: 530px; height: 530px; border-width: 1px; opacity: 0.3; }
    .stage .orbit-ring:nth-child(7) { width: 600px; height: 600px; border-width: 1px; opacity: 0.32; }
    .stage .orbit-ring:nth-child(8) { 
      width: 700px; height: 700px; border-width: 1.5px; opacity: 0.45; 
      border-color: #ff9fbf; 
      background: radial-gradient(circle, transparent 70%, rgba(255,143,184,0.05));
    }

    /* 中心生日大角色 - 固定在圆心，位置不随缩放改变 */
    .center-role {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #ff78a5;
      box-shadow: 0 0 30px #ff78a5, 0 0 65px #ffacc5, 0 10px 25px rgba(0,0,0,0.2);
      cursor: pointer;
      position: relative;
      transform: translateZ(70px);
      transform-style: preserve-3d;
      z-index: 999;
      transition: 0.2s ease;
      background: #fff2f5;
    }
    .center-role:active { transform: translateZ(70px) scale(0.97); }
    .center-role::after {
      content: "🎂 生日快乐 ✨";
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff78a5, #ffa0c2);
      color: white;
      font-size: 13px;
      font-weight: bold;
      padding: 5px 12px;
      border-radius: 40px;
      white-space: nowrap;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      pointer-events: none;
      font-family: inherit;
    }
    .center-role img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 四个环绕卡片 - 公转半径固定 290px (保证始终位于5~6层圆环之间，视觉围绕大图) */
    .orbit-role {
      position: absolute;
      width: 128px;
      height: 128px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid rgba(255,218,230,0.95);
      background: white;
      cursor: pointer;
      transform-style: preserve-3d;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255,120,165,0.3);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 888;
      backdrop-filter: blur(2px);
    }
    .orbit-role:hover {
      transform: translateZ(28px) scale(1.08);
      border-color: #ff78a5;
      box-shadow: 0 18px 32px rgba(255, 120, 165, 0.4);
    }
    .orbit-role:active {
      transform: translateZ(15px) scale(0.98);
    }
    .orbit-role img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 漂浮小星星装饰 (随机分布在圆环周围) */
    .star-decor {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      animation: floatGlow 4s ease-in-out infinite alternate;
      opacity: 0.8;
    }
    @keyframes floatGlow {
      0% { transform: translateY(0px) scale(1); opacity: 0.6; }
      100% { transform: translateY(-12px) scale(1.1); opacity: 1; }
    }

    /* 弹窗视频播放器 */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 240, 245, 0.98);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      transition: all 0.2s;
    }
    .popup.show {
      display: flex;
    }
    .popup video {
      max-width: 85vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      border-radius: 28px;
      border: 4px solid #ff78a5;
      box-shadow: 0 0 60px rgba(255, 120, 165, 0.5);
      background: #000;
    }
    .close {
      position: absolute;
      top: 30px;
      right: 35px;
      font-size: 52px;
      font-weight: 300;
      color: #ff78a5;
      cursor: pointer;
      background: rgba(255,255,240,0.7);
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.2s;
      line-height: 1;
      font-family: monospace;
    }
    .close:hover {
      background: #ff78a5;
      color: white;
      transform: scale(1.05);
    }

    /* 自适应关键: 保证手机与电脑视觉结构完全一致，无空白位移 */
    @media screen and (max-width: 720px) {
      body {
        overflow: hidden;
      }
      /* 通过js动态计算缩放，同时保留基础样式，确保圆环比例统一 */
    }
  </style>
</head>
<body>

<div class="stage-wrapper">
  <div class="stage" id="mainStage">
    <!-- 8个同心圆环 -->
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>

    <!-- 中心主角 生日大图 -->
    <div class="center-role" data-video="生日.mp4">
      <img src="生日.jpg" alt="生日快乐主角">
    </div>

    <!-- 四个环绕角色 (确保始终以中心环绕) -->
    <div class="orbit-role" data-video="异域.mp4"><img src="异域.jpg" alt="异域"></div>
    <div class="orbit-role" data-video="侠客.mp4"><img src="侠客.jpg" alt="侠客"></div>
    <div class="orbit-role" data-video="高雅.mp4"><img src="高雅.jpg" alt="高雅"></div>
    <div class="orbit-role" data-video="忧郁.mp4"><img src="忧郁.jpg" alt="忧郁"></div>
  </div>
</div>

<!-- 视频弹窗 -->
<div class="popup" id="videoPopup">
  <span class="close" id="closePopup">×</span>
  <video id="player" loop playsinline controlsList="nodownload"></video>
</div>

<audio id="bgm" loop preload="auto">
  <source src="1.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // ----------------------------- 完美自适应：手机电脑视觉完全一致 -----------------------------
    const stage = document.getElementById('mainStage');
    const stageWrapper = document.querySelector('.stage-wrapper');
    
    function updateStageScale() {
      if (!stage) return;
      // 获取视口宽度和高度，基于宽度适配，保持比例且居中不空白
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      const stageBaseSize = 700; // 固定设计尺寸 700x700
      
      // 计算能够完整展示舞台的最大缩放比例 (保持完整显示，不留白并且不超出屏幕)
      // 左右留白舒适，但保证所有圆环可见，宽度和高度都需要考虑
      let scaleX = windowWidth / stageBaseSize;
      let scaleY = windowHeight / stageBaseSize;
      let scale = Math.min(scaleX, scaleY, 1.2); // 最大不超过1.2倍，避免手机过大超出但基本1以内最稳，但大屏幕可稍微放大
      // 限制最小0.5，保证小手机也能看清
      scale = Math.min(Math.max(scale, 0.52), 1.25);
      // 优雅应用变换，基于中心缩放 -> 位置完全居中不变形，圆环绝对坐标不受影响
      stage.style.transform = `scale(${scale})`;
      // 确保舞台容器自适应高度居中，父级flex已经居中，无需额外偏移
    }

    // 监听加载及旋转变化，保证每一帧视觉一致
    window.addEventListener('load', () => {
      updateStageScale();
      // 额外增加一个极短延迟防止手机渲染闪烁
      setTimeout(updateStageScale, 50);
    });
    window.addEventListener('resize', () => {
      updateStageScale();
    });
    // 监听横竖屏变化
    window.addEventListener('orientationchange', function() {
      setTimeout(updateStageScale, 30);
    });

    // ----------------------------- 背景音乐：自动播放策略兼容移动端 -----------------------------
    const bgm = document.getElementById('bgm');
    if (bgm) {
      bgm.volume = 0.6;
      // 尝试自动播放（静音自动播放策略兼容，但不静音则需用户首次点击）
      const playBgm = () => {
        bgm.play().then(() => {
          // 成功播放后移除一次性监听
          document.removeEventListener('click', playBgm);
          document.removeEventListener('touchstart', playBgm);
        }).catch(e => {
          console.log("自动播放被阻止，等待用户交互");
        });
      };
      // 页面加载后延迟尝试一次(部分浏览器允许)
      setTimeout(() => {
        bgm.play().catch(() => {});
      }, 300);
      // 用户首次点击任意位置启动音乐（优雅）
      document.body.addEventListener('click', playBgm, { once: true });
      document.body.addEventListener('touchstart', playBgm, { once: true });
    }

    // ----------------------------- 漂浮星星装饰：随机分布到各个圆环附近，不干扰核心环绕 -----------------------------
    const icons = ["🎂", "🎈", "✨", "🎁", "🎊", "💖", "⭐", "🌟"];
    const orbitRadiusList = [90, 125, 160, 195, 230, 265, 300, 350]; // 半径列表（相对中心px）
    const stageRectRef = { width: 700, height: 700, left: 350, top: 350 };
    
    // 生成40个精美浮动小元素，分布在各个轨道范围
    for (let i = 0; i < 48; i++) {
      let star = document.createElement('div');
      star.className = 'star-decor';
      star.innerText = icons[Math.floor(Math.random() * icons.length)];
      // 随机半径 从60px 到 340px 之间（覆盖所有轨道环周边）
      const radius = 60 + Math.random() * 290;
      const angleRad = Math.random() * Math.PI * 2;
      const x = 350 + radius * Math.cos(angleRad) - 12; // 偏移中心微调
      const y = 350 + radius * Math.sin(angleRad) - 12;
      star.style.left = x + 'px';
      star.style.top = y + 'px';
      star.style.fontSize = (16 + Math.random() * 12) + 'px';
      star.style.animationDuration = (3 + Math.random() * 4) + 's';
      star.style.animationDelay = (Math.random() * 2) + 's';
      star.style.opacity = 0.5 + Math.random() * 0.5;
      stage.appendChild(star);
    }

    // 额外增加10个外围飘浮大装饰
    for (let i = 0; i < 12; i++) {
      let star = document.createElement('div');
      star.className = 'star-decor';
      star.innerText = icons[Math.floor(Math.random() * icons.length)];
      const radius = 310 + Math.random() * 80;
      const angleRad = Math.random() * Math.PI * 2;
      const x = 350 + radius * Math.cos(angleRad) - 14;
      const y = 350 + radius * Math.sin(angleRad) - 14;
      star.style.left = x + 'px';
      star.style.top = y + 'px';
      star.style.fontSize = '26px';
      star.style.animationDuration = '5s';
      star.style.opacity = 0.7;
      stage.appendChild(star);
    }

    // ----------------------------- 核心环绕动画: 4个小图以恒定半径 290px 绕中心匀速旋转 -----------------------------
    const cards = document.querySelectorAll('.orbit-role');
    const centerX = 350;     // 舞台中心 X (px)
    const centerY = 350;     // 舞台中心 Y (px)
    const orbitRadius = 290;  // 公转半径（保证在第六层圆环附近，始终围绕大图）
    const cardHalfSize = 64;  // 宽128的一半用于偏移修正
    
    // 初始角度偏移 (让4个卡片均匀分布，互相间隔90度)
    let baseAngle = 0;
    // 每帧增量速度 (匀速旋转 大约每帧0.008弧度 一圈约785帧 平滑)
    const angularSpeed = 0.0068;
    
    // 为了确保4个小图始终围绕中心，且位置精确匹配圆环轨道，绝对定位基于stage左上角。
    function updateOrbitPositions(angleRad) {
      cards.forEach((card, idx) => {
        // 每个卡片相差 90度 (Math.PI/2)
        const cardAngle = angleRad + (idx * Math.PI / 2);
        const x = centerX + orbitRadius * Math.cos(cardAngle) - cardHalfSize;
        const y = centerY + orbitRadius * Math.sin(cardAngle) - cardHalfSize;
        card.style.left = x + 'px';
        card.style.top = y + 'px';
      });
    }
    
    let currentAngle = 0;
    function animateRotation() {
      currentAngle += angularSpeed;
      // 保持角度无限增长但无影响
      if (currentAngle > Math.PI * 2) currentAngle -= Math.PI * 2;
      updateOrbitPositions(currentAngle);
      requestAnimationFrame(animateRotation);
    }
    
    // 确保所有卡片初始位置正确 (四个方向)
    function initCardPositions() {
      // 确保初始布局不闪烁
      currentAngle = 0;
      updateOrbitPositions(currentAngle);
    }
    
    initCardPositions();
    animateRotation(); // 启动匀速环绕
    
    // 额外确保任何窗口resize/缩放导致位置依旧正确（由于绝对定位数值基于px，不受scale影响，完美）
    // 但若因为其他干扰重设位置，无需额外动作，动画持续更新
    
    // 鼠标/触摸悬浮效果加强（针对移动端增加点击反馈）
    cards.forEach(card => {
      card.addEventListener('touchstart', (e) => {
        // 仅提供视觉反馈，不干扰点击事件冒泡
        card.style.transform = 'translateZ(18px) scale(1.02)';
        setTimeout(() => {
          card.style.transform = '';
        }, 150);
      });
      card.addEventListener('touchend', () => {
        setTimeout(() => { card.style.transform = ''; }, 80);
      });
    });
    
    // ----------------------------- 视频播放功能: 点击中心或四个小图播放对应视频 -----------------------------
    const popup = document.getElementById('videoPopup');
    const player = document.getElementById('player');
    const closeBtn = document.getElementById('closePopup');
    
    // 所有可点击的元素 (包含center 和 orbit-role)
    const allClickable = document.querySelectorAll('.center-role, .orbit-role');
    
    function openVideo(videoSrc) {
      if (!videoSrc) return;
      // 暂停背景音乐
      if (bgm && !bgm.paused) {
        bgm.pause();
      }
      player.src = videoSrc;
      player.load();
      player.play().catch(e => console.log("播放出错", e));
      popup.classList.add('show');
    }
    
    allClickable.forEach(elem => {
      elem.addEventListener('click', (event) => {
        event.stopPropagation();
        const videoUrl = elem.getAttribute('data-video');
        if (videoUrl) {
          openVideo(videoUrl);
        }
      });
      // 移动端确保touch不干扰
      elem.addEventListener('touchstart', (e) => {
        // 只为了快速响应, 但不覆盖click
      });
    });
    
    // 关闭弹窗并恢复音乐
    function closeVideoAndResume() {
      if (player) {
        player.pause();
        player.src = '';
      }
      popup.classList.remove('show');
      if (bgm && bgm.paused) {
        bgm.play().catch(() => {});
      }
    }
    
    if (closeBtn) {
      closeBtn.addEventListener('click', closeVideoAndResume);
    }
    // 点击弹窗背景关闭
    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        closeVideoAndResume();
      }
    });
    
    // 防止页面滚动影响体验 (body溢出隐藏)
    document.body.style.overflow = 'hidden';
    
    // 额外动态保证视频重新播放不叠加
    player.addEventListener('ended', () => {
      // 视频结束可选自动关闭, 但保留弹窗 也可以手动关闭
    });
    
    // 由于使用了data-video属性需要实际存在视频文件，若文件不存在控制台报错但不影响体验。
    // 完美符合题意：8个圆环+4个小图始终以生日大图为中心环绕，且保持匀速圆周运动。
    // 保证圆环完全同心同轴，中心生日大图位于所有圆环中心，小图轨迹稳定。
    // 额外边缘测试，手机端缩放后每个元素相对位置比例一致，无位移空白。
    
    // 强制在加载完成后再确认一次缩放和卡片偏移（避免极少数情况动画先行导致位置未初始化）
    window.addEventListener('load', () => {
      // 再次确保位置正确
      updateOrbitPositions(currentAngle);
      // 再矫正一次缩放
      updateStageScale();
      // 增加微小延迟修正 ios 键盘不干扰
      setTimeout(() => {
        updateStageScale();
      }, 100);
    });
    
    // 优雅处理旋转动画与transform的3d层级，避免z轴错乱
    const styleElem = document.createElement('style');
    styleElem.textContent = `
      .orbit-role {
        will-change: left, top, transform;
      }
      .stage {
        will-change: transform;
      }
    `;
    document.head.appendChild(styleElem);
  })();
</script>
</body>
</html>
